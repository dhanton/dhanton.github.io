<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} — {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
</head>
<body>

  <header>
    <img src="{{ '/assets/img/profile.png' | relative_url }}" alt="{{ site.title }}" class="avatar">
    <h1 class="site-name">{{ site.title }}</h1>
    <nav>
      <ul>
        <li><a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="selected"{% endif %}>About</a></li>
        <li><a href="{{ '/resume/' | relative_url }}"{% if page.url contains 'resume' %} class="selected"{% endif %}>Resume</a></li>
        <li><a href="{{ '/contact/' | relative_url }}"{% if page.url contains 'contact' %} class="selected"{% endif %}>Contact</a></li>
        <li><a href="https://github.com/dhanton" target="_blank" rel="noopener">GitHub</a></li>
      </ul>
    </nav>
  </header>

  <main>
    {% if page.title %}
    <h2 class="page-title">{{ page.title }}</h2>
    <hr>
    {% endif %}
    {{ content }}
  </main>

  <footer>
    <p>© {{ site.time | date: "%Y" }} {{ site.title }}. All rights reserved.</p>
  </footer>

</body>
</html>
